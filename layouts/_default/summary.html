<article class="summary">
  <a href="{{ .RelPermalink }}">
    <h2 class="title">{{ .Title }}</h2>
    {{ with .Params.subtitle }}<h3 class="subtitle">{{ . }}</h3>{{ end }}
  </a>
  {{ partial "postMeta.html" . }}
  <div class="content">
    {{ .Summary }}
    {{ if .Truncated }}
      <a href="{{ .RelPermalink }}" aria-label="Read more: {{ .Title }}">Read more...</a>
    {{ end }}
  </div>
</article>
