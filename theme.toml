# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = "smigle-lite"
license = "MIT"
licenselink = "https://github.com/joe-mccarthy/smigle-lite/blob/main/LICENSE"
description = "Minimal Hugo theme using bundled JetBrains Mono and free from tracking or runtime external dependencies"
homepage = "https://github.com/joe-mccarthy/smigle-lite"
tags = ["blog", "portfolio", "minimal", "monospace", "simple", "clean", "light", "responsive", "fast", "no-js", "no-tracking", "privacy", "accessibility", "seo"]
features = ["blog", "taxonomies", "dark mode", "post navigation", "table of contents", "shortcodes", "json-ld", "open graph", "pagefind search"]
min_version = "0.128.0"

[author]
  name = "Joe McCarthy"
  homepage = "https://joe-mccarthy.github.io"

# If porting an existing theme
[original]
  name = "smigle"
  homepage = "https://iansmcb.com/"
  repo = "https://gitlab.com/ian-s-mcb/smigle-hugo-theme"

[module]
  [module.hugoVersion]
    extended = false
    max = ""
    min = "0.128.0"
